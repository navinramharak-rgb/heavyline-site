backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "listings"
    label: "Equipment Listings"
    folder: "listings"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "e.g. CAT 336 Hydraulic Excavator" }
      - { label: "Status", name: "status", widget: "select", options: ["Available", "Pending", "Sold"], default: "Available" }
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false, hint: "Toggle ON to show this listing in the homepage preview (max 3)" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Excavators"
          - "Cranes"
          - "Dozers"
          - "Loaders"
          - "Aerial Equipment"
          - "Dump Trucks"
          - "Scrapers"
          - "Graders"
          - "Forklifts"
          - "Compactors"
          - "Other"
      - { label: "Make", name: "make", widget: "string", hint: "e.g. CAT, Komatsu, Liebherr" }
      - { label: "Model", name: "model", widget: "string", hint: "e.g. 336, D65PX-18" }
      - { label: "Year", name: "year", widget: "number", hint: "4-digit year" }
      - { label: "Hours / Mileage", name: "hours", widget: "string", required: false, hint: "e.g. 4,200 hrs" }
      - { label: "Serial Number", name: "serial", widget: "string", required: false }
      - label: "Condition"
        name: "condition"
        widget: "select"
        options:
          - "Excellent — Like New"
          - "Good — Well Maintained"
          - "Fair — Minor Repairs Needed"
          - "Poor — Requires Significant Work"
      - { label: "Location", name: "location", widget: "string", hint: "e.g. Edmonton, Alberta" }
      - { label: "Description", name: "description", widget: "text", hint: "3-5 sentences about the equipment" }
      - { label: "Known Issues", name: "issues", widget: "string", required: false, hint: "Any known defects — leave blank if none" }
      - { label: "Attachments Included", name: "attachments", widget: "string", required: false, hint: "e.g. Quick coupler, 3 buckets" }
      - { label: "Hero Image", name: "image", widget: "image", hint: "Main photo — minimum 1200px wide" }
      - label: "Gallery Images"
        name: "gallery"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Video URL", name: "video", widget: "string", required: false, hint: "YouTube or Vimeo link for walkaround video" }
      - { label: "Shipping & Pickup Notes", name: "shipping", widget: "text", required: false, hint: "e.g. Buyer responsible for pickup. Can arrange freight via our logistics partners." }
      - { label: "Date Listed", name: "date", widget: "date" }
