backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "listings"
    label: "Equipment Listings"
    folder: "listings"
    create: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "e.g. CAT 336 Hydraulic Excavator" }
      - label: "Status"
        name: "status"
        widget: "select"
        options: ["Available", "Pending", "Sold"]
        default: "Available"
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false, hint: "Toggle ON to show on homepage (max 3)" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Excavators","Cranes","Dozers","Loaders","Aerial Equipment","Dump Trucks","Scrapers","Graders","Forklifts","Compactors","Other"]
      - { label: "Make", name: "make", widget: "string", hint: "e.g. CAT, Komatsu, Liebherr" }
      - { label: "Model", name: "model", widget: "string", hint: "e.g. 336, D65PX-18" }
      - { label: "Year", name: "year", widget: "number" }
      - { label: "Hours / Mileage", name: "hours", widget: "string", required: false, hint: "e.g. 4,200 hrs" }
      - { label: "Serial Number", name: "serial", widget: "string", required: false }
      - label: "Condition"
        name: "condition"
        widget: "select"
        options: ["Excellent — Like New","Good — Well Maintained","Fair — Minor Repairs Needed","Poor — Requires Significant Work"]
      - { label: "Show Price on Listing?", name: "show_price", widget: "boolean", default: false, hint: "Toggle ON to display the price. OFF shows 'Contact for Pricing'." }
      - { label: "Price (CAD)", name: "price", widget: "number", required: false, value_type: "int", hint: "Number only, no symbols. e.g. 85000. Only shown if toggle above is ON." }
      - { label: "Location", name: "location", widget: "string", hint: "e.g. Edmonton, Alberta" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Known Issues", name: "issues", widget: "string", required: false, hint: "Leave blank if none" }
      - { label: "Attachments Included", name: "attachments", widget: "string", required: false }
      - { label: "Hero Image", name: "image", widget: "image" }
      - label: "Gallery Images"
        name: "gallery"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Video URL", name: "video", widget: "string", required: false, hint: "YouTube or Vimeo link" }
      - { label: "Shipping & Pickup Notes", name: "shipping", widget: "text", required: false }
      - { label: "Date Listed", name: "date", widget: "date" }
